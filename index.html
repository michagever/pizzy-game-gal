<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizzy Game Gal</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
    }

    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #crt-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="crt-overlay"></div>
  </div>

  <script>
    // === STAR CLASS ===

    class Star {
      constructor(canvas) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * (canvas.height * 0.8);
        this.size = Math.random() < 0.3 ? 2 : 1;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.5 + Math.random() * 1.5;
      }

      update(dt) {
        this.phase += this.speed * dt;
      }

      draw(ctx) {
        const alpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(this.phase));
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }
    }

    // === BUILDING CLASS ===

    class Building {
      constructor(x, y, width, height) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
        this.destroyed = false;
      }

      destroy() {
        this.destroyed = true;
      }

      getBounds() {
        return { x: this.x, y: this.y, width: this.width, height: this.height };
      }

      update(dt) {
        // no-op stub — S02 may add damage state
      }

      draw(ctx) {
        if (this.destroyed) return;

        // Building body
        ctx.fillStyle = '#00e5ff';
        ctx.fillRect(this.x, this.y, this.width, this.height);

        // Rooftop accent (slightly lighter band at the top)
        ctx.fillStyle = '#66f5ff';
        ctx.fillRect(this.x, this.y, this.width, 4);
        ctx.fillRect(this.x + this.width / 2 - 4, this.y - 4, 8, 4);

        // Dark pixel windows
        ctx.fillStyle = '#003344';
        const winW = 8, winH = 6;
        const cols = 2;
        const rows = Math.max(2, Math.floor(this.height / 22));
        const padX = Math.floor((this.width - cols * winW) / (cols + 1));
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const wx = this.x + padX + c * (winW + padX);
            const wy = this.y + 10 + r * 18;
            if (wy + winH < this.y + this.height - 4) {
              ctx.fillRect(wx, wy, winW, winH);
            }
          }
        }
      }
    }

    // === GAME CLASS ===

    class Game {
      constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.ctx.imageSmoothingEnabled = false;

        this.state = 'playing';
        this.lastTime = 0;
        this.stars = [];
        this.buildings = [];

        this._initStars();
        this._initBuildings();

        this.canvas.addEventListener('click', e => this._handleClick(e));

        requestAnimationFrame(t => this._loop(t));
      }

      _loop(timestamp) {
        const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
        this.lastTime = timestamp;
        this.update(dt);
        this.draw();
        requestAnimationFrame(t => this._loop(t));
      }

      update(dt) {
        for (const star of this.stars) star.update(dt);
        for (const building of this.buildings) building.update(dt);
      }

      draw() {
        const ctx = this.ctx;
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, 800, 600);
        for (const star of this.stars) star.draw(ctx);
        for (const building of this.buildings) building.draw(ctx);
      }

      _handleClick(e) {
        // S02 will fill this
      }

      _initStars() {
        for (let i = 0; i < 90; i++) {
          this.stars.push(new Star(this.canvas));
        }
      }

      _initBuildings() {
        const heights = [80, 60, 90, 70, 100, 65];
        for (let i = 0; i < 6; i++) {
          const x = 40 + i * (720 / 5);
          const h = heights[i];
          const y = 600 - h - 10;
          this.buildings.push(new Building(x, y, 64, h));
        }
      }
    }

    window.addEventListener('load', () => new Game());
  </script>
</body>
</html>
