<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pizzy Game Gal</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: 4 / 3;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: none;
    }

    #crt-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="crt-overlay"></div>
  </div>

  <script>
    // === STAR CLASS ===

    class Star {
      constructor(canvas) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * (canvas.height * 0.8);
        this.size = Math.random() < 0.3 ? 2 : 1;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.5 + Math.random() * 1.5;
        this.isBright = Math.random() < 0.035;
        if (this.isBright) {
          this.size = 1;
          this.sparkleSize = 3 + Math.floor(Math.random() * 3);
        }
      }

      update(dt) {
        this.phase += this.speed * dt;
      }

      draw(ctx) {
        const alpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(this.phase));
        if (this.isBright) {
          const s = this.sparkleSize;
          ctx.fillStyle = `rgba(180,200,255,${(alpha * 0.6).toFixed(2)})`;
          ctx.fillRect(this.x - Math.floor(s / 2), this.y, s, 1);
          ctx.fillRect(this.x, this.y - Math.floor(s / 2), 1, s);
          ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
          ctx.fillRect(this.x, this.y, 1, 1);
        } else {
          ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
          ctx.fillRect(this.x, this.y, this.size, this.size);
        }
      }
    }

    // === BUILDING CLASS ===

    class Building {
      constructor(x, y, width, height) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
        this.destroyed = false;
        this.shielded = false;
        this.windowFlicker = [];
        const winW = 8, winH = 6;
        const cols = 2;
        const rows = Math.max(2, Math.floor(this.height / 22));
        const padX = Math.floor((this.width - cols * winW) / (cols + 1));
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const wx = padX + c * (winW + padX);
            const wy = 10 + r * 18;
            if (wy + winH < this.height - 4) {
              this.windowFlicker.push({
                rx: wx, ry: wy,
                lit: Math.random() < 0.3,
                timer: Math.random() * 5,
                interval: 3 + Math.random() * 8
              });
            }
          }
        }
      }

      destroy() {
        this.destroyed = true;
        this.shielded = false;
      }

      getBounds() {
        return { x: this.x, y: this.y, width: this.width, height: this.height };
      }

      update(dt) {
        if (this.destroyed) return;
        for (const w of this.windowFlicker) {
          w.timer += dt;
          if (w.timer >= w.interval) {
            w.timer = 0;
            w.lit = !w.lit;
            w.interval = 3 + Math.random() * 8;
          }
        }
      }

      draw(ctx) {
        if (this.destroyed) return;

        // Building body with depth
        ctx.fillStyle = '#006880';
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.fillStyle = '#008aa0';
        ctx.fillRect(this.x, this.y, 3, this.height);
        ctx.fillStyle = '#004455';
        ctx.fillRect(this.x + this.width - 3, this.y, 3, this.height);

        // Rooftop accent
        ctx.fillStyle = '#00c8e0';
        ctx.fillRect(this.x, this.y, this.width, 4);
        ctx.fillRect(this.x + this.width / 2 - 4, this.y - 4, 8, 4);

        // Antenna
        ctx.fillStyle = '#00c8e0';
        ctx.fillRect(this.x + this.width / 2, this.y - 10, 2, 10);
        ctx.fillRect(this.x + this.width / 2 - 2, this.y - 10, 6, 2);

        // Windows with flicker
        const winW = 8, winH = 6;
        for (const w of this.windowFlicker) {
          if (w.lit) {
            ctx.save();
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = '#ffdd44';
            ctx.fillRect(this.x + w.rx - 1, this.y + w.ry - 1, winW + 2, winH + 2);
            ctx.restore();
            ctx.fillStyle = '#ffdd44';
            ctx.fillRect(this.x + w.rx, this.y + w.ry, winW, winH);
          } else {
            ctx.fillStyle = '#002233';
            ctx.fillRect(this.x + w.rx, this.y + w.ry, winW, winH);
          }
        }

        // Shield bubble
        if (this.shielded) {
          const cx = this.x + this.width / 2;
          const cy = this.y + this.height / 2;
          const r = Math.max(this.width, this.height) * 0.7;
          ctx.save();
          ctx.globalAlpha = 0.1 + 0.05 * Math.sin(Date.now() * 0.005);
          ctx.fillStyle = '#4488ff';
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          ctx.save();
          ctx.globalAlpha = 0.4 + 0.1 * Math.sin(Date.now() * 0.005);
          ctx.strokeStyle = '#4488ff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    // === FLOATING TEXT CLASS ===

    class FloatingText {
      constructor(x, y, text, color) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color || '#ffffff';
        this.life = 1.2;
        this.maxLife = 1.2;
        this.vy = -40;
      }
      isDead() { return this.life <= 0; }
      update(dt) {
        this.y += this.vy * dt;
        this.life -= dt;
      }
      draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color;
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(this.text, this.x, this.y);
        ctx.restore();
      }
    }

    // === MISSILE CLASS ===

    class Missile {
      constructor(x, y, tx, ty, speed, type) {
        this.x = x; this.y = y;
        this.type = type || 'normal';
        this.hp = this.type === 'armored' ? 2 : 1;
        this.canSplit = this.type === 'cluster';
        this.splitHeight = 300 + Math.random() * 120;
        this.hasSplit = false;
        this.isChild = false;
        this.hitFlash = 0;
        const dist = Math.hypot(tx - x, ty - y);
        this.vx = (tx - x) / dist * speed;
        this.vy = (ty - y) / dist * speed;
        this.trail = [];
        this.alive = true;
        this.glowPhase = Math.random() * Math.PI * 2;

        // Type-specific colors
        switch (this.type) {
          case 'fast':
            this.colors = {
              trailGlow: '#ffaa00', bodyMain: '#886611', bodyDark: '#664400',
              warhead: '#ddaa00', warheadBright: '#ffcc00',
              glowCenter: '#ffaa00', glowEdge: 'rgba(255,170,0,0)',
              fins: '#aa8833', exhaust: '#ffdd00'
            };
            break;
          case 'armored':
            this.colors = {
              trailGlow: '#00ff44', bodyMain: '#226633', bodyDark: '#114422',
              warhead: '#00cc22', warheadBright: '#22ff44',
              glowCenter: '#00ff44', glowEdge: 'rgba(0,255,68,0)',
              fins: '#338844', exhaust: '#00ff44'
            };
            break;
          case 'cluster':
            this.colors = {
              trailGlow: '#cc44ff', bodyMain: '#551188', bodyDark: '#330066',
              warhead: '#aa22dd', warheadBright: '#cc44ff',
              glowCenter: '#cc44ff', glowEdge: 'rgba(204,68,255,0)',
              fins: '#7733aa', exhaust: '#cc44ff'
            };
            break;
          default:
            this.colors = {
              trailGlow: '#ff4400', bodyMain: '#881111', bodyDark: '#661111',
              warhead: '#cc2200', warheadBright: '#ff4400',
              glowCenter: '#ff6600', glowEdge: 'rgba(255,50,0,0)',
              fins: '#993333', exhaust: '#ff8800'
            };
            break;
        }
      }

      update(dt) {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 14) this.trail.shift();
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.glowPhase += 8 * dt;
        this.hitFlash = Math.max(0, this.hitFlash - dt * 3);
      }

      draw(ctx) {
        const angle = Math.atan2(this.vy, this.vx);
        const c = this.colors;

        // Trail
        for (let i = 0; i < this.trail.length; i++) {
          const p = this.trail[i];
          const t = (i + 1) / this.trail.length;
          ctx.save();
          ctx.globalAlpha = t * 0.12;
          ctx.fillStyle = c.trailGlow;
          ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
          ctx.restore();
          ctx.save();
          ctx.globalAlpha = t * 0.8;
          ctx.fillStyle = c.trailGlow;
          ctx.fillRect(p.x - 1, p.y - 1, 3, 3);
          ctx.restore();
        }

        // Missile body (rotated)
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(angle);

        // Warhead glow
        const glowSize = 6 + 2 * Math.sin(this.glowPhase);
        ctx.save();
        ctx.globalAlpha = 0.25 + 0.1 * Math.sin(this.glowPhase);
        const grd = ctx.createRadialGradient(4, 0, 0, 4, 0, glowSize);
        grd.addColorStop(0, c.glowCenter);
        grd.addColorStop(1, c.glowEdge);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(4, 0, glowSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Main body
        const bw = this.type === 'armored' ? 14 : 12;
        const bh = this.type === 'armored' ? 5 : 4;
        ctx.fillStyle = c.bodyMain;
        ctx.fillRect(-bw / 2, -bh / 2, bw, bh);
        ctx.fillStyle = c.bodyDark;
        ctx.fillRect(-bw / 2, -1, bw, 2);

        // Armor plates for armored type
        if (this.type === 'armored') {
          ctx.fillStyle = '#44aa44';
          ctx.fillRect(-4, -bh / 2 - 1, 8, 1);
          ctx.fillRect(-4, bh / 2, 8, 1);
        }

        // Warhead tip
        ctx.fillStyle = c.warhead;
        ctx.beginPath();
        ctx.moveTo(6, -2); ctx.lineTo(10, 0); ctx.lineTo(6, 2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = c.warheadBright;
        ctx.beginPath();
        ctx.moveTo(7, -1); ctx.lineTo(9, 0); ctx.lineTo(7, 1);
        ctx.closePath();
        ctx.fill();

        // Tail fins
        ctx.fillStyle = c.fins;
        ctx.beginPath();
        ctx.moveTo(-6, -2); ctx.lineTo(-9, -5); ctx.lineTo(-4, -2);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-6, 2); ctx.lineTo(-9, 5); ctx.lineTo(-4, 2);
        ctx.closePath();
        ctx.fill();

        // Engine exhaust flicker
        ctx.save();
        ctx.globalAlpha = 0.5 + 0.3 * Math.sin(this.glowPhase * 2);
        ctx.fillStyle = c.exhaust;
        ctx.fillRect(-8, -1, 3, 2);
        ctx.restore();

        // Hit flash overlay
        if (this.hitFlash > 0) {
          ctx.save();
          ctx.globalAlpha = this.hitFlash;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(-8, -4, 18, 8);
          ctx.restore();
        }

        // Cluster pulsing outline
        if (this.type === 'cluster' && !this.hasSplit) {
          ctx.save();
          ctx.globalAlpha = 0.3 + 0.2 * Math.sin(this.glowPhase * 2);
          ctx.strokeStyle = '#cc44ff';
          ctx.lineWidth = 1;
          ctx.strokeRect(-8, -4, 18, 8);
          ctx.restore();
        }

        ctx.restore();
      }
    }

    // === INTERCEPTOR CLASS ===

    class Interceptor {
      constructor(x, y, tx, ty) {
        this.x = x; this.y = y;
        this.tx = tx; this.ty = ty;
        this.speed = 350;
        this.trail = [];
        this.alive = true;
        this.enginePhase = 0;
      }
      update(dt) {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 16) this.trail.shift();
        this.enginePhase += 12 * dt;
        const dist = Math.hypot(this.tx - this.x, this.ty - this.y);
        if (dist < this.speed * dt) {
          this.alive = false;
          return { detonated: true, cx: this.tx, cy: this.ty };
        }
        this.x += (this.tx - this.x) / dist * this.speed * dt;
        this.y += (this.ty - this.y) / dist * this.speed * dt;
        return { detonated: false };
      }
      draw(ctx) {
        const a = Math.atan2(this.ty - this.y, this.tx - this.x);

        for (let i = 0; i < this.trail.length; i++) {
          const p = this.trail[i];
          const t = (i + 1) / this.trail.length;
          ctx.save();
          ctx.globalAlpha = t * 0.1;
          ctx.fillStyle = '#4488ff';
          ctx.fillRect(p.x - 4, p.y - 4, 8, 8);
          ctx.restore();
          ctx.save();
          ctx.globalAlpha = (1 - t) * 0.35;
          ctx.fillStyle = '#99aabb';
          const s = 2 + (1 - t) * 3;
          ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
          ctx.restore();
          ctx.fillStyle = i % 2 === 0
            ? `rgba(100,180,255,${(t * 0.9).toFixed(2)})`
            : `rgba(255,240,100,${(t * 0.7).toFixed(2)})`;
          ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
        }

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(a);

        const exSize = 8 + 3 * Math.sin(this.enginePhase);
        ctx.save();
        ctx.globalAlpha = 0.3 + 0.15 * Math.sin(this.enginePhase);
        const grd = ctx.createRadialGradient(-6, 0, 0, -6, 0, exSize);
        grd.addColorStop(0, '#66aaff');
        grd.addColorStop(0.5, '#3366ff');
        grd.addColorStop(1, 'rgba(50,100,255,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(-6, 0, exSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = '#ddeeff';
        ctx.fillRect(-5, -1.5, 10, 3);
        ctx.fillStyle = '#4488ff';
        ctx.fillRect(-5, -0.5, 10, 1);

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(5, -1.5); ctx.lineTo(8, 0); ctx.lineTo(5, 1.5);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#88aacc';
        ctx.beginPath();
        ctx.moveTo(-5, -1.5); ctx.lineTo(-7, -4); ctx.lineTo(-3, -1.5);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-5, 1.5); ctx.lineTo(-7, 4); ctx.lineTo(-3, 1.5);
        ctx.closePath();
        ctx.fill();

        ctx.save();
        ctx.globalAlpha = 0.7 + 0.3 * Math.sin(this.enginePhase * 2);
        ctx.fillStyle = '#88ccff';
        ctx.fillRect(-8, -1, 3, 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-7, -0.5, 2, 1);
        ctx.restore();

        ctx.restore();
      }
    }

    // === EXPLOSION CLASS ===

    class Explosion {
      constructor(cx, cy, maxRadius, duration, isGround) {
        this.cx = cx; this.cy = cy;
        this.maxRadius = maxRadius;
        this.duration = duration;
        this.timer = 0;
        this.isGround = isGround;
        this.shockwaveRadius = 0;
        this.shockwaveMax = maxRadius * 1.6;
        this.blocks = [];
        for (let i = 0; i < 20; i++) {
          this.blocks.push({
            angle: Math.random() * Math.PI * 2,
            dist: Math.random(),
            size: 3 + Math.random() * 5,
            color: Math.random()
          });
        }
      }
      get radius() {
        return this.maxRadius * Math.min(this.timer / (this.duration * 0.4), 1);
      }
      get alpha() {
        return Math.max(0, 1 - this.timer / this.duration);
      }
      isColliding(x, y) {
        return Math.hypot(x - this.cx, y - this.cy) <= this.radius;
      }
      isDone() { return this.timer >= this.duration; }
      update(dt) {
        this.timer += dt;
        this.shockwaveRadius = Math.min(this.shockwaveMax, this.shockwaveRadius + this.shockwaveMax * dt * 2.5);
      }
      draw(ctx) {
        if (this.alpha <= 0) return;
        const r = this.radius;
        ctx.save();

        const swAlpha = Math.max(0, 1 - this.shockwaveRadius / this.shockwaveMax) * 0.5;
        if (swAlpha > 0.01) {
          ctx.save();
          ctx.globalAlpha = swAlpha;
          ctx.strokeStyle = this.isGround ? '#ff8800' : '#aaddff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(this.cx, this.cy, this.shockwaveRadius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        ctx.globalAlpha = this.alpha;

        const grad1 = ctx.createRadialGradient(this.cx, this.cy, r * 0.6, this.cx, this.cy, r);
        grad1.addColorStop(0, this.isGround ? 'rgba(255,120,0,0.5)' : 'rgba(255,200,50,0.4)');
        grad1.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad1;
        ctx.beginPath();
        ctx.arc(this.cx, this.cy, r, 0, Math.PI * 2);
        ctx.fill();

        const grad2 = ctx.createRadialGradient(this.cx, this.cy, 0, this.cx, this.cy, r * 0.6);
        grad2.addColorStop(0, this.isGround ? 'rgba(255,200,0,0.7)' : 'rgba(255,255,150,0.6)');
        grad2.addColorStop(1, 'rgba(255,150,0,0)');
        ctx.fillStyle = grad2;
        ctx.beginPath();
        ctx.arc(this.cx, this.cy, r * 0.6, 0, Math.PI * 2);
        ctx.fill();

        if (this.timer < this.duration * 0.3) {
          const coreAlpha = 1 - this.timer / (this.duration * 0.3);
          ctx.save();
          ctx.globalAlpha = coreAlpha * this.alpha;
          const grad3 = ctx.createRadialGradient(this.cx, this.cy, 0, this.cx, this.cy, r * 0.3);
          grad3.addColorStop(0, 'rgba(255,255,255,0.9)');
          grad3.addColorStop(1, 'rgba(255,255,200,0)');
          ctx.fillStyle = grad3;
          ctx.beginPath();
          ctx.arc(this.cx, this.cy, r * 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        for (const b of this.blocks) {
          const bx = this.cx + Math.cos(b.angle) * b.dist * r;
          const by = this.cy + Math.sin(b.angle) * b.dist * r;
          let col;
          if (b.color < 0.3) col = this.isGround ? '#ff4400' : '#ffff88';
          else if (b.color < 0.6) col = this.isGround ? '#ff8800' : '#ffdd44';
          else col = this.isGround ? '#ffcc00' : '#ffffff';
          ctx.fillStyle = col;
          ctx.fillRect(Math.floor(bx), Math.floor(by), Math.floor(b.size), Math.floor(b.size));
        }

        ctx.strokeStyle = this.isGround ? '#ff5500' : '#ffff44';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.cx, this.cy, r, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }
    }

    // === PARTICLE CLASS ===

    class Particle {
      constructor(x, y, vx, vy, color, life, size) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.color = color;
        this.life = life;
        this.maxLife = life;
        this.size = size || 2;
        this.gravity = 150;
      }
      isDead() { return this.life <= 0; }
      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += this.gravity * dt;
        this.life -= dt;
      }
      draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color;
        const s = this.size;
        ctx.fillRect(this.x - s / 2, this.y - s / 2, s, s);
        ctx.restore();
      }
    }

    // === PICKUP CLASS ===

    class Pickup {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'shield', 'nuke', 'repair'
        this.vy = 35;
        this.alive = true;
        this.phase = Math.random() * Math.PI * 2;
      }
      update(dt) {
        this.y += this.vy * dt;
        this.phase += 4 * dt;
        if (this.y > 600) this.alive = false;
      }
      draw(ctx) {
        if (!this.alive) return;
        const colors = { shield: '#4488ff', nuke: '#ff4444', repair: '#44ff88' };
        const color = colors[this.type];
        ctx.save();
        ctx.translate(this.x, this.y);

        // Pulsing glow
        ctx.save();
        ctx.globalAlpha = 0.3 + 0.2 * Math.sin(this.phase * 3);
        ctx.fillStyle = color;
        ctx.fillRect(-10, -10, 20, 20);
        ctx.restore();

        // Rotating square
        ctx.save();
        ctx.rotate(this.phase);
        ctx.fillStyle = color;
        ctx.fillRect(-6, -6, 12, 12);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.strokeRect(-6, -6, 12, 12);
        ctx.restore();

        // Icon letter
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const labels = { shield: 'S', nuke: '!', repair: '+' };
        ctx.fillText(labels[this.type], 0, 1);

        ctx.restore();
      }
    }

    // === BOSS CLASS ===

    class Boss {
      constructor(wave) {
        this.x = -60;
        this.y = 50;
        this.width = 60;
        this.height = 24;
        this.hp = 3 + Math.floor(wave / 5) * 2;
        this.maxHp = this.hp;
        this.speed = 30 + wave * 2;
        this.alive = true;
        this.direction = 1;
        this.dropTimer = 0;
        this.dropInterval = Math.max(1.2, 2.5 - wave * 0.08);
        this.enginePhase = 0;
        this.hitFlash = 0;
        this.hitByExplosions = new Set();
      }

      update(dt) {
        this.x += this.speed * this.direction * dt;
        this.enginePhase += 10 * dt;
        this.hitFlash = Math.max(0, this.hitFlash - dt * 3);
        if (this.x > 860) this.alive = false;
      }

      draw(ctx) {
        if (!this.alive) return;
        ctx.save();
        ctx.translate(this.x, this.y);

        // Wings
        ctx.fillStyle = '#556';
        ctx.fillRect(-30, -2, 60, 4);

        // Body
        ctx.fillStyle = '#444';
        ctx.fillRect(-15, -10, 30, 20);
        ctx.fillStyle = '#555';
        ctx.fillRect(-15, -10, 30, 3);

        // Cockpit
        ctx.fillStyle = '#88aacc';
        ctx.fillRect(12, -5, 5, 6);

        // Tail
        ctx.fillStyle = '#444';
        ctx.fillRect(-18, -15, 6, 12);
        ctx.fillStyle = '#555';
        ctx.fillRect(-18, -15, 6, 2);

        // Engines under wings
        const engineGlow = 0.5 + 0.3 * Math.sin(this.enginePhase);
        ctx.save();
        ctx.globalAlpha = engineGlow;
        ctx.fillStyle = '#ff4400';
        ctx.fillRect(-25, 2, 4, 4);
        ctx.fillRect(21, 2, 4, 4);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(-24, 3, 2, 2);
        ctx.fillRect(22, 3, 2, 2);
        ctx.restore();

        // Hit flash
        if (this.hitFlash > 0) {
          ctx.save();
          ctx.globalAlpha = this.hitFlash;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(-30, -15, 60, 30);
          ctx.restore();
        }

        ctx.restore();

        // HP bar
        const barW = 50, barH = 4;
        const barX = this.x - barW / 2;
        const barY = this.y - 24;
        ctx.fillStyle = '#333';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = this.hp > this.maxHp * 0.3 ? '#ff3333' : '#ff0000';
        ctx.fillRect(barX, barY, barW * (this.hp / this.maxHp), barH);
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        ctx.strokeRect(barX, barY, barW, barH);

        // Label
        ctx.save();
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ff6666';
        ctx.font = 'bold 10px monospace';
        ctx.fillText('BOMBER', this.x, this.y - 28);
        ctx.restore();
      }
    }

    // === SOUND ENGINE CLASS ===

    class SoundEngine {
      constructor() {
        this.ctx = null;
        this._musicPlaying = false;
        this._musicTimer = null;
        this._sirenPlaying = false;
      }

      _ensureContext() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
        return this.ctx;
      }

      playLaunch() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.linearRampToValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0.001, now + 0.12);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.12);
        osc.onended = () => { osc.disconnect(); gain.disconnect(); };
      }

      playExplosion() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(80, now + 0.3);
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.linearRampToValueAtTime(0.001, now + 0.35);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.35);
        osc.onended = () => { osc.disconnect(); gain.disconnect(); };
      }

      playBuildingHit() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(150, now);
        osc1.frequency.linearRampToValueAtTime(40, now + 0.4);
        gain1.gain.setValueAtTime(0.5, now);
        gain1.gain.linearRampToValueAtTime(0.001, now + 0.45);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.45);
        osc1.onended = () => { osc1.disconnect(); gain1.disconnect(); };

        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'square';
        osc2.frequency.setValueAtTime(200, now);
        osc2.frequency.linearRampToValueAtTime(80, now + 0.05);
        osc2.frequency.setValueAtTime(300, now + 0.05);
        osc2.frequency.linearRampToValueAtTime(50, now + 0.15);
        osc2.frequency.setValueAtTime(180, now + 0.15);
        osc2.frequency.linearRampToValueAtTime(30, now + 0.35);
        gain2.gain.setValueAtTime(0.35, now);
        gain2.gain.linearRampToValueAtTime(0.001, now + 0.45);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now);
        osc2.stop(now + 0.45);
        osc2.onended = () => { osc2.disconnect(); gain2.disconnect(); };
      }

      playWaveComplete() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'square';
        osc1.frequency.setValueAtTime(400, now);
        gain1.gain.setValueAtTime(0.25, now);
        gain1.gain.linearRampToValueAtTime(0.001, now + 0.12);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.12);
        osc1.onended = () => { osc1.disconnect(); gain1.disconnect(); };

        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'square';
        osc2.frequency.setValueAtTime(600, now + 0.12);
        gain2.gain.setValueAtTime(0.001, now);
        gain2.gain.setValueAtTime(0.25, now + 0.12);
        gain2.gain.linearRampToValueAtTime(0.001, now + 0.27);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now + 0.12);
        osc2.stop(now + 0.27);
        osc2.onended = () => { osc2.disconnect(); gain2.disconnect(); };
      }

      playGameOver() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        const notes = [500, 400, 250];
        const noteDur = 0.2;
        const gap = 0.05;
        notes.forEach((freq, i) => {
          const start = now + i * (noteDur + gap);
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(freq, start);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.setValueAtTime(0.3, start);
          gain.gain.linearRampToValueAtTime(0.001, start + noteDur);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(start);
          osc.stop(start + noteDur);
          osc.onended = () => { osc.disconnect(); gain.disconnect(); };
        });
      }

      playPickup() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(500, now);
        osc.frequency.linearRampToValueAtTime(800, now + 0.08);
        osc.frequency.setValueAtTime(600, now + 0.08);
        osc.frequency.linearRampToValueAtTime(900, now + 0.15);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.001, now + 0.18);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.18);
        osc.onended = () => { osc.disconnect(); gain.disconnect(); };
      }

      playSiren() {
        if (this._sirenPlaying) return;
        this._sirenPlaying = true;
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.linearRampToValueAtTime(400, now + 0.5);
        osc.frequency.linearRampToValueAtTime(200, now + 1.0);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.linearRampToValueAtTime(0.001, now + 1.0);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 1.0);
        osc.onended = () => {
          osc.disconnect(); gain.disconnect();
          this._sirenPlaying = false;
        };
      }

      startMusic() {
        if (this._musicPlaying) return;
        const ctx = this._ensureContext();
        this._musicPlaying = true;

        const bpm = 140;
        const beat = 60 / bpm;

        // Bass line: 8 quarter notes = 2 bars
        const bass = [82.41, 82.41, 110, 98, 82.41, 82.41, 110, 130.81];
        // Melody: 16 eighth notes = 2 bars (0 = rest)
        const mel = [330, 0, 392, 330, 0, 294, 262, 0, 330, 0, 392, 440, 0, 392, 330, 0];

        const loop = () => {
          if (!this._musicPlaying) return;
          const now = ctx.currentTime + 0.05;

          for (let i = 0; i < bass.length; i++) {
            const t = now + i * beat;
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'triangle';
            o.frequency.value = bass[i];
            g.gain.setValueAtTime(0.08, t);
            g.gain.setValueAtTime(0.001, t + beat * 0.85);
            o.connect(g); g.connect(ctx.destination);
            o.start(t); o.stop(t + beat * 0.9);
            o.onended = () => { o.disconnect(); g.disconnect(); };
          }

          for (let i = 0; i < mel.length; i++) {
            if (!mel[i]) continue;
            const t = now + i * beat * 0.5;
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'square';
            o.frequency.value = mel[i];
            g.gain.setValueAtTime(0.04, t);
            g.gain.linearRampToValueAtTime(0.001, t + beat * 0.4);
            o.connect(g); g.connect(ctx.destination);
            o.start(t); o.stop(t + beat * 0.45);
            o.onended = () => { o.disconnect(); g.disconnect(); };
          }

          this._musicTimer = setTimeout(loop, bass.length * beat * 1000);
        };
        loop();
      }

      stopMusic() {
        this._musicPlaying = false;
        if (this._musicTimer) {
          clearTimeout(this._musicTimer);
          this._musicTimer = null;
        }
      }

      toggleMusic() {
        if (this._musicPlaying) this.stopMusic();
        else this.startMusic();
      }
    }

    // === GAME CLASS ===

    class Game {
      constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.ctx.imageSmoothingEnabled = false;

        this.state = 'start';
        this.lastTime = 0;
        this.stars = [];
        this.buildings = [];

        this._initStars();
        this._initBuildings();

        this.score = 0;
        this.interceptors = [];
        this.missiles = [];
        this.explosions = [];
        this.particles = [];
        this.floatingTexts = [];
        this.pickups = [];
        this.boss = null;

        this.shakeTimer = 0;
        this.shakeMag = 0;
        this.spawnTimer = 0;
        this.spawnInterval = 2.2;

        // Wave system
        this.wave = 0;
        this.missilesSpawnedThisWave = 0;
        this.totalMissilesThisWave = 0;
        this.isBossWave = false;
        this.interludeBonusAwarded = false;
        this.interludeBonus = 0;

        // Combo system
        this.comboCount = 0;
        this.comboTimer = 0;
        this.comboMultiplier = 1;

        // Economy / progression
        this.ammo = 0;
        this.maxAmmo = 0;
        this.bonusAmmo = 0;
        this.blastRadiusMultiplier = 1.0;
        this.shopItems = [
          { label: 'REPAIR', cost: 200, action: 'repair' },
          { label: 'AMMO +5', cost: 150, action: 'ammo' },
          { label: 'BIG BLAST', cost: 300, action: 'blast' },
        ];

        // High score
        this.highScore = 0;
        try { this.highScore = parseInt(localStorage.getItem('ironDomeHighScore')) || 0; } catch (e) {}

        // Polish
        this.paused = false;
        this.musicOn = false;
        this.sirenCooldown = 0;

        this.sound = new SoundEngine();

        this.mouseX = 400;
        this.mouseY = 300;
        this.flashTimer = 0;

        // Input: mouse
        this.canvas.addEventListener('click', e => this._handleClick(e));
        this.canvas.addEventListener('mousemove', e => {
          const rect = this.canvas.getBoundingClientRect();
          this.mouseX = (e.clientX - rect.left) * (800 / rect.width);
          this.mouseY = (e.clientY - rect.top) * (600 / rect.height);
        });

        // Input: touch
        this.canvas.addEventListener('touchstart', e => {
          e.preventDefault();
          const touch = e.changedTouches[0];
          const rect = this.canvas.getBoundingClientRect();
          this.mouseX = (touch.clientX - rect.left) * (800 / rect.width);
          this.mouseY = (touch.clientY - rect.top) * (600 / rect.height);
          this._handleClick({ clientX: touch.clientX, clientY: touch.clientY });
        }, { passive: false });
        this.canvas.addEventListener('touchmove', e => {
          e.preventDefault();
          const touch = e.changedTouches[0];
          const rect = this.canvas.getBoundingClientRect();
          this.mouseX = (touch.clientX - rect.left) * (800 / rect.width);
          this.mouseY = (touch.clientY - rect.top) * (600 / rect.height);
        }, { passive: false });

        // Input: keyboard (pause, music)
        window.addEventListener('keydown', e => {
          if ((e.key === 'p' || e.key === 'P' || e.key === 'Escape') && this.state === 'playing') {
            this.paused = !this.paused;
          }
          if (e.key === 'm' || e.key === 'M') {
            this.musicOn = !this.musicOn;
            this.sound.toggleMusic();
          }
        });

        this._resizeContainer();
        window.addEventListener('resize', () => this._resizeContainer());

        requestAnimationFrame(t => this._loop(t));
      }

      // ========== GAME LOOP ==========

      _loop(timestamp) {
        const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
        this.lastTime = timestamp;
        this.update(dt);
        this.draw();
        requestAnimationFrame(t => this._loop(t));
      }

      // ========== UPDATE ==========

      update(dt) {
        // Stars always animate
        for (const star of this.stars) star.update(dt);

        // Interlude: cleanup effects, wait for shop interaction
        if (this.state === 'interlude') {
          for (const ex of this.explosions) ex.update(dt);
          this.explosions = this.explosions.filter(ex => !ex.isDone());
          for (const p of this.particles) p.update(dt);
          this.particles = this.particles.filter(p => !p.isDead());
          for (const ft of this.floatingTexts) ft.update(dt);
          this.floatingTexts = this.floatingTexts.filter(ft => !ft.isDead());
          return;
        }

        if (this.state !== 'playing') return;
        if (this.paused) return;

        // === PLAYING STATE ===
        for (const building of this.buildings) building.update(dt);

        // 1. Decay timers
        this.shakeTimer = Math.max(0, this.shakeTimer - dt);
        this.flashTimer = Math.max(0, this.flashTimer - dt);
        this.sirenCooldown = Math.max(0, this.sirenCooldown - dt);

        // Combo timer decay
        if (this.comboTimer > 0) {
          this.comboTimer -= dt;
          if (this.comboTimer <= 0) {
            this.comboCount = 0;
            this.comboMultiplier = 1;
          }
        }

        // 2. Update interceptors, collect detonations
        for (const ic of this.interceptors) {
          if (!ic.alive) continue;
          const result = ic.update(dt);
          if (result.detonated) {
            this.explosions.push(new Explosion(result.cx, result.cy, 60 * this.blastRadiusMultiplier, 1.8, false));
            this._spawnSparks(result.cx, result.cy, 8);
            this.flashTimer = 0.06;
            this.sound.playExplosion();
          }
        }
        this.interceptors = this.interceptors.filter(i => i.alive);

        // 3. Missile spawner (non-boss waves)
        if (!this.isBossWave) {
          this.spawnTimer += dt;
          if (this.spawnTimer >= this.spawnInterval && this.missilesSpawnedThisWave < this.totalMissilesThisWave) {
            this.spawnTimer = 0;
            this._spawnMissile();
          }
        }

        // 4. Update missiles
        for (const m of this.missiles) m.update(dt);

        // 4a. Cluster missile split
        const newMissiles = [];
        for (const m of this.missiles) {
          if (!m.alive || !m.canSplit || m.hasSplit) continue;
          if (m.y >= m.splitHeight) {
            m.hasSplit = true;
            m.alive = false;
            const aliveBuildings = this.buildings.filter(b => !b.destroyed);
            for (let i = 0; i < 3; i++) {
              const target = aliveBuildings.length > 0 ? aliveBuildings[Math.floor(Math.random() * aliveBuildings.length)] : null;
              const tx = target ? target.x + target.width / 2 : 100 + Math.random() * 600;
              const ty = target ? target.y + target.height / 2 : 590;
              const spd = Math.min((80 + Math.random() * 40) * (1 + this.wave * 0.12), 250);
              const child = new Missile(m.x + (i - 1) * 20, m.y, tx, ty, spd, 'normal');
              child.isChild = true;
              newMissiles.push(child);
            }
            this._spawnSparks(m.x, m.y, 8);
            this.floatingTexts.push(new FloatingText(m.x, m.y - 10, 'SPLIT!', '#cc44ff'));
          }
        }
        this.missiles.push(...newMissiles);

        // 4b. Direct-hit detection: interceptor physically hits a missile
        for (const ic of this.interceptors) {
          if (!ic.alive) continue;
          for (const m of this.missiles) {
            if (!m.alive) continue;
            if (Math.hypot(ic.x - m.x, ic.y - m.y) < 14) {
              ic.alive = false;
              m.alive = false;
              this._registerKill(25, m.x, m.y);
              this.explosions.push(new Explosion(m.x, m.y, 90 * this.blastRadiusMultiplier, 2.2, false));
              this._spawnDebris(m.x, m.y, 24, ['#ffffff', '#ffff44', '#ff8800', '#88ccff']);
              this._spawnSparks(m.x, m.y, 14);
              this._spawnEmbers(m.x, m.y, 8);
              this.flashTimer = 0.1;
              this._screenShake(0.25, 5);
              this.sound.playExplosion();
              break;
            }
          }
        }
        this.interceptors = this.interceptors.filter(i => i.alive);

        // 5. Building AABB hit detection
        for (const m of this.missiles) {
          if (!m.alive) continue;
          for (const b of this.buildings) {
            if (b.destroyed) continue;
            const bounds = b.getBounds();
            if (m.x >= bounds.x && m.x <= bounds.x + bounds.width &&
                m.y >= bounds.y && m.y <= bounds.y + bounds.height) {
              m.alive = false;
              const bcx = bounds.x + bounds.width / 2;
              const bcy = bounds.y + bounds.height / 2;
              if (b.shielded) {
                b.shielded = false;
                this._spawnSparks(bcx, bcy, 12);
                this._spawnDebris(bcx, bcy, 8, ['#4488ff', '#88ccff', '#aaddff']);
                this.floatingTexts.push(new FloatingText(bcx, bcy - 20, 'SHIELD!', '#4488ff'));
                this.sound.playExplosion();
              } else {
                b.destroy();
                this.explosions.push(new Explosion(bcx, bcy, 90, 1.0, true));
                this._spawnDebris(bcx, bcy, 30, ['#ff8800', '#ffcc00', '#ff4400', '#888888']);
                this._spawnEmbers(bcx, bcy, 10);
                this._spawnSparks(bcx, bcy, 8);
                this.flashTimer = 0.08;
                this._screenShake(0.4, 8);
                this.sound.playBuildingHit();
              }
              break;
            }
          }
        }

        // 6. Explosion updates + missile kill detection
        for (const ex of this.explosions) ex.update(dt);
        for (const m of this.missiles) {
          if (!m.alive) continue;
          for (const ex of this.explosions) {
            if (!ex.isDone() && !ex.isGround && ex.isColliding(m.x, m.y)) {
              m.hp--;
              if (m.hp <= 0) {
                m.alive = false;
                this._registerKill(m.type === 'armored' ? 20 : 10, m.x, m.y);
                this._spawnDebris(m.x, m.y, 12, ['#ff6644', '#ffaa22', '#ffffff']);
                this._spawnSparks(m.x, m.y, 6);
                this._spawnEmbers(m.x, m.y, 4);
              } else {
                // Armored hit — flash but survive
                m.hitFlash = 0.3;
                this._spawnSparks(m.x, m.y, 3);
              }
              break;
            }
          }
        }
        this.explosions = this.explosions.filter(ex => !ex.isDone());

        // 7. Boss update
        if (this.boss && this.boss.alive) {
          this.boss.update(dt);

          // Boss drops missiles
          this.boss.dropTimer += dt;
          if (this.boss.dropTimer >= this.boss.dropInterval) {
            this.boss.dropTimer = 0;
            const aliveBuildings = this.buildings.filter(b => !b.destroyed);
            const target = aliveBuildings.length > 0 ? aliveBuildings[Math.floor(Math.random() * aliveBuildings.length)] : null;
            const tx = target ? target.x + target.width / 2 : Math.random() * 800;
            const ty = target ? target.y + target.height / 2 : 590;
            const spd = Math.min((80 + Math.random() * 40) * (1 + this.wave * 0.12), 250);
            this.missiles.push(new Missile(this.boss.x, this.boss.y + 15, tx, ty, spd, 'normal'));
          }

          // Boss hit detection against explosions
          for (const ex of this.explosions) {
            if (!ex.isDone() && !ex.isGround && !this.boss.hitByExplosions.has(ex) && ex.isColliding(this.boss.x, this.boss.y)) {
              this.boss.hitByExplosions.add(ex);
              this.boss.hp--;
              this.boss.hitFlash = 0.3;
              this.sound.playExplosion();
              this._spawnSparks(this.boss.x, this.boss.y, 10);
              if (this.boss.hp <= 0) {
                this.boss.alive = false;
                this._registerKill(200, this.boss.x, this.boss.y);
                this.explosions.push(new Explosion(this.boss.x, this.boss.y, 120, 2.5, false));
                this._spawnDebris(this.boss.x, this.boss.y, 40, ['#ff8800', '#ffcc00', '#ffffff', '#888888']);
                this._screenShake(0.5, 10);
                this.flashTimer = 0.15;
              }
            }
          }

          // Boss direct-hit by interceptor
          if (this.boss.alive) {
            for (const ic of this.interceptors) {
              if (!ic.alive) continue;
              if (Math.abs(ic.x - this.boss.x) < 30 && Math.abs(ic.y - this.boss.y) < 15) {
                ic.alive = false;
                this.boss.hp--;
                this.boss.hitFlash = 0.3;
                this.sound.playExplosion();
                this._spawnSparks(this.boss.x, this.boss.y, 10);
                this.explosions.push(new Explosion(ic.x, ic.y, 60 * this.blastRadiusMultiplier, 1.8, false));
                if (this.boss.hp <= 0) {
                  this.boss.alive = false;
                  this._registerKill(200, this.boss.x, this.boss.y);
                  this.explosions.push(new Explosion(this.boss.x, this.boss.y, 120, 2.5, false));
                  this._spawnDebris(this.boss.x, this.boss.y, 40, ['#ff8800', '#ffcc00', '#ffffff', '#888888']);
                  this._screenShake(0.5, 10);
                  this.flashTimer = 0.15;
                }
                break;
              }
            }
            this.interceptors = this.interceptors.filter(i => i.alive);
          }
        }

        // 8. Pickups
        for (const pk of this.pickups) pk.update(dt);
        this.pickups = this.pickups.filter(pk => pk.alive);

        // 9. Floating texts
        for (const ft of this.floatingTexts) ft.update(dt);
        this.floatingTexts = this.floatingTexts.filter(ft => !ft.isDead());

        // 10. Particles
        for (const p of this.particles) p.update(dt);
        this.particles = this.particles.filter(p => !p.isDead());

        // 11. Filter dead/off-screen missiles
        for (const m of this.missiles) {
          if (m.y > 620 || m.y < -20 || m.x < -20 || m.x > 820) m.alive = false;
        }
        this.missiles = this.missiles.filter(m => m.alive);

        // 12. Screen shake
        if (this.shakeTimer > 0) {
          const dx = (Math.random() - 0.5) * 2 * this.shakeMag;
          const dy = (Math.random() - 0.5) * 2 * this.shakeMag;
          this.canvas.style.transform = `translate(${dx}px,${dy}px)`;
        } else {
          this.canvas.style.transform = '';
        }

        // 13. Siren (3+ missiles on screen)
        if (this.missiles.length >= 3 && this.sirenCooldown <= 0) {
          this.sound.playSiren();
          this.sirenCooldown = 3.0;
        }

        // 14. Game-over detection
        if (this.buildings.filter(b => !b.destroyed).length === 0) {
          this.state = 'game_over';
          this.sound.playGameOver();
          if (this.musicOn) {
            this.sound.stopMusic();
            this.musicOn = false;
          }
          this.canvas.style.transform = '';
          if (this.score > this.highScore) {
            this.highScore = this.score;
            try { localStorage.setItem('ironDomeHighScore', String(this.highScore)); } catch (e) {}
          }
          return;
        }

        // 15. Wave-completion detection
        if (this.isBossWave) {
          if ((!this.boss || !this.boss.alive) && this.missiles.length === 0) {
            this._endWave();
          }
        } else {
          if (this.missilesSpawnedThisWave >= this.totalMissilesThisWave && this.missiles.length === 0 && this.state === 'playing') {
            this._endWave();
          }
        }
      }

      // ========== DRAW ==========

      draw() {
        const ctx = this.ctx;

        // Sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, 600);
        skyGrad.addColorStop(0, '#050510');
        skyGrad.addColorStop(0.6, '#0a0a2a');
        skyGrad.addColorStop(0.85, '#12082a');
        skyGrad.addColorStop(1, '#1a1030');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, 800, 600);
        for (const star of this.stars) star.draw(ctx);

        // Ground strip
        ctx.fillStyle = '#1a1410';
        ctx.fillRect(0, 588, 800, 12);
        ctx.fillStyle = '#2a2218';
        ctx.fillRect(0, 588, 800, 2);

        if (this.state === 'start') {
          this._drawStartScreen(ctx);
          this._drawCrosshair(ctx);
          return;
        }

        if (this.state === 'game_over') {
          for (const building of this.buildings) building.draw(ctx);
          this._drawGameOverScreen(ctx);
          return;
        }

        // === PLAYING and INTERLUDE ===

        // City glow (behind buildings)
        this._drawCityGlow(ctx);

        for (const building of this.buildings) building.draw(ctx);

        // Warning indicators
        this._drawWarnings(ctx);

        // === IRON DOME LAUNCHER ===
        const baseX = 400, baseY = 588;

        ctx.fillStyle = '#3a4a2a';
        ctx.fillRect(baseX - 24, baseY - 4, 48, 10);
        ctx.fillStyle = '#2d3d1d';
        ctx.fillRect(baseX - 28, baseY - 6, 10, 12);
        ctx.fillStyle = '#556';
        ctx.fillRect(baseX - 27, baseY - 4, 6, 4);
        ctx.fillStyle = '#2a3a1a';
        ctx.fillRect(baseX - 22, baseY + 6, 44, 4);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(baseX - 20, baseY + 6, 8, 5);
        ctx.fillRect(baseX - 4, baseY + 6, 8, 5);
        ctx.fillRect(baseX + 12, baseY + 6, 8, 5);
        ctx.fillStyle = '#444';
        ctx.fillRect(baseX - 18, baseY + 8, 4, 2);
        ctx.fillRect(baseX - 2, baseY + 8, 4, 2);
        ctx.fillRect(baseX + 14, baseY + 8, 4, 2);

        ctx.fillStyle = '#556655';
        ctx.fillRect(baseX + 17, baseY - 16, 2, 12);
        ctx.strokeStyle = '#88bb88';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(baseX + 18, baseY - 18, 5, Math.PI * 0.6, Math.PI * 1.8);
        ctx.stroke();
        ctx.fillStyle = '#aaddaa';
        ctx.fillRect(baseX + 17, baseY - 19, 2, 2);

        ctx.fillStyle = '#4a5a3a';
        ctx.fillRect(baseX - 8, baseY - 8, 16, 6);

        const aimAngle = Math.atan2(this.mouseY - (baseY - 6), this.mouseX - baseX);
        const clampedAngle = Math.max(-Math.PI * 0.92, Math.min(-Math.PI * 0.08, aimAngle));

        ctx.save();
        ctx.translate(baseX, baseY - 6);
        ctx.rotate(clampedAngle);

        for (let i = -1; i <= 1; i++) {
          const ty = i * 4;
          ctx.fillStyle = '#5a6a4a';
          ctx.fillRect(0, ty - 2, 24, 4);
          ctx.fillStyle = '#222';
          ctx.fillRect(22, ty - 1.5, 3, 3);
          ctx.fillStyle = '#7a8a6a';
          ctx.fillRect(1, ty - 2, 21, 1);
        }
        ctx.fillStyle = '#4a5a3a';
        ctx.fillRect(-3, -7, 6, 14);
        ctx.restore();

        // Entity layers
        for (const m of this.missiles) m.draw(ctx);
        for (const ic of this.interceptors) ic.draw(ctx);
        if (this.boss && this.boss.alive) this.boss.draw(ctx);
        for (const ex of this.explosions) ex.draw(ctx);
        for (const p of this.particles) p.draw(ctx);
        for (const pk of this.pickups) pk.draw(ctx);
        for (const ft of this.floatingTexts) ft.draw(ctx);

        // HUD
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(`SCORE: ${this.score}`, 10, 20);
        ctx.fillText(`BUILDINGS: ${this.buildings.filter(b => !b.destroyed).length}`, 10, 40);

        ctx.textAlign = 'right';
        ctx.fillText(`WAVE: ${this.wave}`, 790, 20);
        // Ammo with low-ammo flash
        if (this.ammo <= 3 && this.state === 'playing' && Math.sin(Date.now() * 0.01) > 0) {
          ctx.fillStyle = '#ff3333';
        } else {
          ctx.fillStyle = '#ffffff';
        }
        ctx.fillText(`AMMO: ${this.ammo}`, 790, 40);
        ctx.textAlign = 'left';

        // High score on HUD
        if (this.highScore > 0 && this.score < this.highScore) {
          ctx.fillStyle = '#555555';
          ctx.font = '12px monospace';
          ctx.textAlign = 'right';
          ctx.fillText(`HI: ${this.highScore}`, 790, 58);
          ctx.textAlign = 'left';
        }

        // Combo display
        if (this.comboMultiplier > 1) {
          ctx.fillStyle = this.comboMultiplier >= 3 ? '#ff8844' : '#ffdd44';
          ctx.font = 'bold 20px monospace';
          ctx.fillText(`x${this.comboMultiplier}`, 10, 64);
          // Combo timer bar
          ctx.fillStyle = '#333';
          ctx.fillRect(10, 70, 60, 3);
          ctx.fillStyle = this.comboMultiplier >= 3 ? '#ff8844' : '#ffdd44';
          ctx.fillRect(10, 70, 60 * Math.max(0, this.comboTimer / 2.0), 3);
        }

        // Music indicator
        ctx.fillStyle = '#444444';
        ctx.font = '10px monospace';
        ctx.textAlign = 'right';
        ctx.fillText(this.musicOn ? '♪ ON' : '♪ OFF', 790, 590);
        ctx.textAlign = 'left';

        // Boss wave indicator
        if (this.isBossWave && this.boss && this.boss.alive) {
          ctx.save();
          ctx.textAlign = 'center';
          ctx.fillStyle = Math.sin(Date.now() * 0.008) > 0 ? '#ff4444' : '#ff8888';
          ctx.font = 'bold 16px monospace';
          ctx.fillText('!! BOSS WAVE !!', 400, 20);
          ctx.restore();
        }

        // Screen flash
        if (this.flashTimer > 0) {
          ctx.save();
          ctx.globalAlpha = Math.min(1, this.flashTimer * 6);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, 800, 600);
          ctx.restore();
        }

        // Crosshair
        this._drawCrosshair(ctx);

        // Overlays
        if (this.state === 'interlude') {
          this._drawShop(ctx);
        }

        if (this.paused) {
          this._drawPauseOverlay(ctx);
        }
      }

      // ========== INPUT ==========

      _handleClick(e) {
        if (this.state === 'start') {
          this._resetGame();
          this.state = 'playing';
          this._startWave(1);
          return;
        }

        if (this.state === 'game_over') {
          this._resetGame();
          this.state = 'start';
          return;
        }

        const rect = this.canvas.getBoundingClientRect();
        const gx = (e.clientX - rect.left) * (800 / rect.width);
        const gy = (e.clientY - rect.top) * (600 / rect.height);

        if (this.state === 'interlude') {
          this._handleShopClick(gx, gy);
          return;
        }

        // state === 'playing'
        if (this.paused) return;

        // Check pickup clicks first
        for (const pk of this.pickups) {
          if (!pk.alive) continue;
          if (Math.hypot(gx - pk.x, gy - pk.y) < 20) {
            pk.alive = false;
            this._applyPickup(pk.type);
            this.sound.playPickup();
            return;
          }
        }

        // Interceptor launch
        const activeCount = this.interceptors.filter(i => i.alive).length
                          + this.explosions.filter(ex => !ex.isGround && !ex.isDone()).length;
        if (activeCount >= 3) return;
        if (this.ammo <= 0) return;

        this.ammo--;
        this.interceptors.push(new Interceptor(400, 588, gx, gy));
        this._spawnLaunchSmoke();
        this.sound.playLaunch();
      }

      _handleShopClick(gx, gy) {
        const btnWidth = 180, btnHeight = 50, gap = 10;
        const totalW = this.shopItems.length * btnWidth + (this.shopItems.length - 1) * gap;
        const startX = 400 - totalW / 2;
        const btnY = 320;

        // Check shop items
        for (let i = 0; i < this.shopItems.length; i++) {
          const item = this.shopItems[i];
          const bx = startX + i * (btnWidth + gap);
          if (gx >= bx && gx <= bx + btnWidth && gy >= btnY && gy <= btnY + btnHeight) {
            if (this.score < item.cost) return;
            if (item.action === 'repair') {
              const destroyed = this.buildings.filter(b => b.destroyed);
              if (destroyed.length === 0) return;
              this.score -= item.cost;
              destroyed[0].destroyed = false;
              destroyed[0].shielded = false;
              destroyed[0].windowFlicker.forEach(w => { w.lit = Math.random() < 0.3; });
              this.floatingTexts.push(new FloatingText(400, 280, 'BUILDING REPAIRED!', '#44ff88'));
              this.sound.playWaveComplete();
            } else if (item.action === 'ammo') {
              this.score -= item.cost;
              this.bonusAmmo += 5;
              this.floatingTexts.push(new FloatingText(400, 280, 'AMMO +5!', '#ffdd44'));
              this.sound.playLaunch();
            } else if (item.action === 'blast') {
              this.score -= item.cost;
              this.blastRadiusMultiplier += 0.1;
              this.floatingTexts.push(new FloatingText(400, 280, 'BLAST +10%!', '#ff8844'));
              this.sound.playExplosion();
            }
            return;
          }
        }

        // Check continue button
        const contX = 340, contY = 400, contW = 120, contH = 36;
        if (gx >= contX && gx <= contX + contW && gy >= contY && gy <= contY + contH) {
          this.state = 'playing';
          this._startWave(this.wave + 1);
        }
      }

      // ========== DRAW HELPERS ==========

      _drawStartScreen(ctx) {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 40px monospace';
        ctx.fillText('IRON DOME', 400, 230);
        ctx.font = '20px monospace';
        ctx.fillStyle = '#cccccc';
        ctx.fillText('Click to Start', 400, 280);
        ctx.fillStyle = '#999999';
        ctx.font = '14px monospace';
        ctx.fillText('Tap to play on mobile', 400, 310);
        if (this.highScore > 0) {
          ctx.fillStyle = '#ffdd44';
          ctx.font = '16px monospace';
          ctx.fillText(`HIGH SCORE: ${this.highScore}`, 400, 350);
        }
        ctx.fillStyle = '#666666';
        ctx.font = '12px monospace';
        ctx.fillText('P = Pause  |  M = Music', 400, 390);
        ctx.restore();
      }

      _drawGameOverScreen(ctx) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, 800, 600);
        ctx.save();
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 48px monospace';
        ctx.fillText('GAME OVER', 400, 230);
        ctx.fillStyle = '#ffffff';
        ctx.font = '24px monospace';
        ctx.fillText(`FINAL SCORE: ${this.score}`, 400, 290);
        if (this.score >= this.highScore && this.highScore > 0) {
          ctx.fillStyle = '#ffdd44';
          ctx.font = 'bold 20px monospace';
          ctx.fillText('NEW HIGH SCORE!', 400, 325);
        } else if (this.highScore > 0) {
          ctx.fillStyle = '#aaaaaa';
          ctx.font = '16px monospace';
          ctx.fillText(`HIGH SCORE: ${this.highScore}`, 400, 325);
        }
        ctx.fillStyle = '#cccccc';
        ctx.font = '18px monospace';
        ctx.fillText('Click to Restart', 400, 370);
        ctx.restore();
      }

      _drawShop(ctx) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(0, 0, 800, 600);

        ctx.save();
        ctx.textAlign = 'center';

        // Wave complete header
        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 36px monospace';
        ctx.fillText(`WAVE ${this.wave} COMPLETE`, 400, 170);

        // Building bonus
        if (this.interludeBonusAwarded && this.interludeBonus > 0) {
          ctx.fillStyle = '#ffdd44';
          ctx.font = 'bold 20px monospace';
          ctx.fillText(`+${this.interludeBonus} BUILDING BONUS`, 400, 210);
        }

        // Score
        ctx.fillStyle = '#ffffff';
        ctx.font = '18px monospace';
        ctx.fillText(`SCORE: ${this.score}`, 400, 250);

        // Shop label
        ctx.fillStyle = '#aaaaaa';
        ctx.font = '14px monospace';
        ctx.fillText('SPEND SCORE ON UPGRADES', 400, 290);

        // Shop item buttons
        const btnWidth = 180, btnHeight = 50, gap = 10;
        const totalW = this.shopItems.length * btnWidth + (this.shopItems.length - 1) * gap;
        const startX = 400 - totalW / 2;
        const btnY = 320;

        for (let i = 0; i < this.shopItems.length; i++) {
          const item = this.shopItems[i];
          const bx = startX + i * (btnWidth + gap);
          const canAfford = this.score >= item.cost;
          const isDisabled = !canAfford || (item.action === 'repair' && this.buildings.filter(b => b.destroyed).length === 0);

          ctx.fillStyle = isDisabled ? '#222' : '#333';
          ctx.fillRect(bx, btnY, btnWidth, btnHeight);
          ctx.strokeStyle = isDisabled ? '#444' : '#888';
          ctx.lineWidth = 1;
          ctx.strokeRect(bx, btnY, btnWidth, btnHeight);

          ctx.textAlign = 'center';
          ctx.fillStyle = isDisabled ? '#555' : '#ffffff';
          ctx.font = 'bold 13px monospace';
          ctx.fillText(item.label, bx + btnWidth / 2, btnY + 22);

          ctx.fillStyle = isDisabled ? '#444' : '#ffdd44';
          ctx.font = '12px monospace';
          ctx.fillText(`${item.cost} pts`, bx + btnWidth / 2, btnY + 40);
        }

        // Continue button
        const contX = 340, contY = 400, contW = 120, contH = 36;
        ctx.fillStyle = '#225522';
        ctx.fillRect(contX, contY, contW, contH);
        ctx.strokeStyle = '#44aa44';
        ctx.lineWidth = 1;
        ctx.strokeRect(contX, contY, contW, contH);
        ctx.fillStyle = '#44ff44';
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('CONTINUE >', contX + contW / 2, contY + 24);

        ctx.restore();
      }

      _drawCrosshair(ctx) {
        const mx = this.mouseX, my = this.mouseY;
        ctx.fillStyle = '#00ff88';
        ctx.fillRect(mx - 8, my, 6, 1);
        ctx.fillRect(mx + 3, my, 6, 1);
        ctx.fillRect(mx, my - 8, 1, 6);
        ctx.fillRect(mx, my + 3, 1, 6);
        ctx.fillRect(mx, my, 1, 1);
      }

      _drawWarnings(ctx) {
        if (this.state !== 'playing') return;
        for (const b of this.buildings) {
          if (b.destroyed) continue;
          let threatened = false;
          const bcx = b.x + b.width / 2;
          const bcy = b.y;
          for (const m of this.missiles) {
            if (!m.alive) continue;
            if (Math.hypot(m.x - bcx, m.y - bcy) < 120) {
              threatened = true;
              break;
            }
          }
          if (threatened && Math.sin(Date.now() * 0.01) > 0) {
            const wx = b.x + b.width / 2;
            const wy = b.y - 20;
            ctx.fillStyle = '#ff3333';
            ctx.beginPath();
            ctx.moveTo(wx, wy - 6);
            ctx.lineTo(wx - 5, wy + 4);
            ctx.lineTo(wx + 5, wy + 4);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(wx - 0.5, wy - 3, 1, 4);
            ctx.fillRect(wx - 0.5, wy + 2, 1, 1);
          }
        }
      }

      _drawCityGlow(ctx) {
        const intensity = Math.min(0.3, this.explosions.filter(ex => !ex.isDone()).length * 0.08);
        if (intensity < 0.01) return;
        ctx.save();
        ctx.globalAlpha = intensity;
        const grd = ctx.createLinearGradient(0, 500, 0, 590);
        grd.addColorStop(0, 'rgba(255,150,50,0)');
        grd.addColorStop(1, 'rgba(255,100,30,0.6)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 500, 800, 90);
        ctx.restore();
      }

      _drawPauseOverlay(ctx) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(0, 0, 800, 600);
        ctx.save();
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 48px monospace';
        ctx.fillText('PAUSED', 400, 280);
        ctx.fillStyle = '#999999';
        ctx.font = '16px monospace';
        ctx.fillText('Press P or ESC to resume', 400, 330);
        ctx.restore();
      }

      // ========== GAME LOGIC HELPERS ==========

      _registerKill(basePoints, x, y) {
        this.comboCount++;
        this.comboTimer = 2.0;
        if (this.comboCount >= 6) this.comboMultiplier = 4;
        else if (this.comboCount >= 4) this.comboMultiplier = 3;
        else if (this.comboCount >= 2) this.comboMultiplier = 2;
        else this.comboMultiplier = 1;

        const points = basePoints * this.comboMultiplier;
        this.score += points;

        const text = this.comboMultiplier > 1
          ? `+${points} x${this.comboMultiplier}`
          : `+${points}`;
        const color = this.comboMultiplier >= 3 ? '#ff8844' : this.comboMultiplier >= 2 ? '#ffdd44' : '#ffffff';
        this.floatingTexts.push(new FloatingText(x, y - 10, text, color));

        // 8% chance to spawn a pickup
        if (Math.random() < 0.08) {
          const types = ['shield', 'nuke', 'repair'];
          this.pickups.push(new Pickup(x, y, types[Math.floor(Math.random() * types.length)]));
        }
      }

      _applyPickup(type) {
        if (type === 'shield') {
          const alive = this.buildings.filter(b => !b.destroyed && !b.shielded);
          if (alive.length > 0) {
            alive[Math.floor(Math.random() * alive.length)].shielded = true;
          }
          this.floatingTexts.push(new FloatingText(400, 300, 'SHIELD ACTIVE!', '#4488ff'));
        } else if (type === 'nuke') {
          for (const m of this.missiles) {
            if (m.alive) {
              m.alive = false;
              this._spawnDebris(m.x, m.y, 6, ['#ff6644', '#ffaa22']);
              this.score += 5;
            }
          }
          this.flashTimer = 0.15;
          this._screenShake(0.3, 6);
          this.floatingTexts.push(new FloatingText(400, 300, 'NUKE!', '#ff4444'));
        } else if (type === 'repair') {
          const destroyed = this.buildings.filter(b => b.destroyed);
          if (destroyed.length > 0) {
            const b = destroyed[Math.floor(Math.random() * destroyed.length)];
            b.destroyed = false;
            b.windowFlicker.forEach(w => { w.lit = Math.random() < 0.3; });
          }
          this.floatingTexts.push(new FloatingText(400, 300, 'REPAIRED!', '#44ff88'));
        }
      }

      _startWave(n) {
        this.wave = n;
        this.isBossWave = (n % 5 === 0) && n > 0;

        if (this.isBossWave) {
          this.totalMissilesThisWave = 0;
          this.boss = new Boss(n);
        } else {
          this.totalMissilesThisWave = 3 + n * 2;
          this.boss = null;
        }

        this.missilesSpawnedThisWave = 0;
        this.spawnInterval = Math.max(0.6, 2.2 - n * 0.15);
        this.spawnTimer = 0;
        this.ammo = 10 + n * 2 + this.bonusAmmo;
        this.maxAmmo = this.ammo;
      }

      _endWave() {
        this.state = 'interlude';
        this.sound.playWaveComplete();
        const alive = this.buildings.filter(b => !b.destroyed).length;
        this.interludeBonus = alive * 100;
        this.score += this.interludeBonus;
        this.interludeBonusAwarded = true;

        if (this.score > this.highScore) {
          this.highScore = this.score;
          try { localStorage.setItem('ironDomeHighScore', String(this.highScore)); } catch (e) {}
        }
      }

      _resetGame() {
        this.buildings = [];
        this._initBuildings();
        this.score = 0;
        this.interceptors = [];
        this.missiles = [];
        this.explosions = [];
        this.particles = [];
        this.floatingTexts = [];
        this.pickups = [];
        this.boss = null;
        this.spawnTimer = 0;
        this.shakeTimer = 0;
        this.shakeMag = 0;
        this.wave = 0;
        this.missilesSpawnedThisWave = 0;
        this.totalMissilesThisWave = 0;
        this.isBossWave = false;
        this.interludeBonusAwarded = false;
        this.interludeBonus = 0;
        this.flashTimer = 0;
        this.canvas.style.transform = '';
        this.comboCount = 0;
        this.comboTimer = 0;
        this.comboMultiplier = 1;
        this.ammo = 0;
        this.maxAmmo = 0;
        this.bonusAmmo = 0;
        this.blastRadiusMultiplier = 1.0;
        this.paused = false;
        this.sirenCooldown = 0;
      }

      _spawnMissile() {
        const sx = 20 + Math.random() * 760;
        const alive = this.buildings.filter(b => !b.destroyed);
        const target = alive.length > 0 ? alive[Math.floor(Math.random() * alive.length)] : null;
        const tx = target ? target.x + target.width / 2 : Math.random() * 800;
        const ty = target ? target.y + target.height / 2 : 590;

        // Determine missile type based on wave
        let type = 'normal';
        const roll = Math.random();
        if (this.wave >= 7 && roll < 0.15) {
          type = 'cluster';
        } else if (this.wave >= 5 && roll < 0.25) {
          type = 'armored';
        } else if (this.wave >= 3 && roll < 0.3) {
          type = 'fast';
        }

        let speed = (80 + Math.random() * 40) * (1 + this.wave * 0.12);
        speed = Math.min(speed, 250);
        if (type === 'fast') speed *= 1.8;

        this.missiles.push(new Missile(sx, 0, tx, ty, speed, type));
        this.missilesSpawnedThisWave++;
      }

      // ========== PARTICLE SPAWNERS ==========

      _spawnDebris(cx, cy, count, colors) {
        for (let i = 0; i < count && this.particles.length < 300; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 40 + Math.random() * 120;
          const color = colors[Math.floor(Math.random() * colors.length)];
          const size = 1 + Math.floor(Math.random() * 3);
          this.particles.push(new Particle(
            cx, cy,
            Math.cos(angle) * speed, Math.sin(angle) * speed - 60,
            color, 0.6 + Math.random() * 0.8, size
          ));
        }
      }

      _spawnEmbers(cx, cy, count) {
        for (let i = 0; i < count && this.particles.length < 300; i++) {
          const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
          const speed = 15 + Math.random() * 40;
          const p = new Particle(
            cx + (Math.random() - 0.5) * 20, cy,
            Math.cos(angle) * speed, Math.sin(angle) * speed - 20,
            Math.random() < 0.5 ? '#ff8844' : '#ffaa22',
            1.5 + Math.random() * 2.0, 1
          );
          p.gravity = -20;
          this.particles.push(p);
        }
      }

      _spawnSparks(cx, cy, count) {
        for (let i = 0; i < count && this.particles.length < 300; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 150 + Math.random() * 200;
          this.particles.push(new Particle(
            cx, cy,
            Math.cos(angle) * speed, Math.sin(angle) * speed,
            '#ffffff', 0.15 + Math.random() * 0.2, 1
          ));
        }
      }

      _spawnLaunchSmoke() {
        for (let i = 0; i < 10 && this.particles.length < 300; i++) {
          const angle = -Math.PI / 2 + (Math.random() - 0.5) * 2.0;
          const speed = 20 + Math.random() * 50;
          const p = new Particle(
            400 + (Math.random() - 0.5) * 16, 588,
            Math.cos(angle) * speed, Math.sin(angle) * speed * 0.5 + 30,
            Math.random() < 0.5 ? '#888888' : '#aaaaaa',
            0.4 + Math.random() * 0.6, 3 + Math.floor(Math.random() * 3)
          );
          p.gravity = -30;
          this.particles.push(p);
        }
      }

      _screenShake(duration, magnitude) {
        this.shakeTimer = duration;
        this.shakeMag = magnitude;
      }

      // ========== INIT ==========

      _initStars() {
        for (let i = 0; i < 120; i++) {
          this.stars.push(new Star(this.canvas));
        }
      }

      _initBuildings() {
        const heights = [80, 60, 90, 70, 100, 65];
        for (let i = 0; i < 6; i++) {
          const x = 40 + i * (720 / 5);
          const h = heights[i];
          const y = 600 - h - 10;
          this.buildings.push(new Building(x, y, 64, h));
        }
      }

      _resizeContainer() {
        const container = document.getElementById('game-container');
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / 800, vh / 600);
        const w = Math.floor(800 * scale);
        const h = Math.floor(600 * scale);
        container.style.width = w + 'px';
        container.style.height = h + 'px';
      }
    }

    window.addEventListener('load', () => new Game());
  </script>
</body>
</html>
