<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizzy Game Gal</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
    }

    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #crt-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="crt-overlay"></div>
  </div>

  <script>
    // === STAR CLASS ===

    class Star {
      constructor(canvas) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * (canvas.height * 0.8);
        this.size = Math.random() < 0.3 ? 2 : 1;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.5 + Math.random() * 1.5;
      }

      update(dt) {
        this.phase += this.speed * dt;
      }

      draw(ctx) {
        const alpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(this.phase));
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }
    }

    // === BUILDING CLASS ===

    class Building {
      constructor(x, y, width, height) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
        this.destroyed = false;
      }

      destroy() {
        this.destroyed = true;
      }

      getBounds() {
        return { x: this.x, y: this.y, width: this.width, height: this.height };
      }

      update(dt) {
        // no-op stub — S02 may add damage state
      }

      draw(ctx) {
        if (this.destroyed) return;

        // Building body
        ctx.fillStyle = '#00e5ff';
        ctx.fillRect(this.x, this.y, this.width, this.height);

        // Rooftop accent (slightly lighter band at the top)
        ctx.fillStyle = '#66f5ff';
        ctx.fillRect(this.x, this.y, this.width, 4);
        ctx.fillRect(this.x + this.width / 2 - 4, this.y - 4, 8, 4);

        // Dark pixel windows
        ctx.fillStyle = '#003344';
        const winW = 8, winH = 6;
        const cols = 2;
        const rows = Math.max(2, Math.floor(this.height / 22));
        const padX = Math.floor((this.width - cols * winW) / (cols + 1));
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const wx = this.x + padX + c * (winW + padX);
            const wy = this.y + 10 + r * 18;
            if (wy + winH < this.y + this.height - 4) {
              ctx.fillRect(wx, wy, winW, winH);
            }
          }
        }
      }
    }

    // === MISSILE CLASS ===

    class Missile {
      constructor(x, y, tx, ty, speed) {
        this.x = x; this.y = y;
        const dist = Math.hypot(tx - x, ty - y);
        this.vx = (tx - x) / dist * speed;
        this.vy = (ty - y) / dist * speed;
        this.trail = [];   // last ~8 positions [{x,y}]
        this.alive = true;
      }
      update(dt) {
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > 8) this.trail.shift();
        this.x += this.vx * dt;
        this.y += this.vy * dt;
      }
      draw(ctx) {
        // Draw red pixel trail (fading alpha) then 3x3 red head
        this.trail.forEach((p, i) => {
          ctx.fillStyle = `rgba(255,60,60,${(i+1)/this.trail.length * 0.7})`;
          ctx.fillRect(p.x-1, p.y-1, 2, 2);
        });
        ctx.fillStyle = '#ff3c3c';
        ctx.fillRect(this.x-1, this.y-1, 3, 3);
      }
    }

    // === INTERCEPTOR CLASS ===

    class Interceptor {
      constructor(x, y, tx, ty) {
        this.x = x; this.y = y;
        this.tx = tx; this.ty = ty;
        this.speed = 350;  // px/s
        this.trail = [];
        this.alive = true;
      }
      update(dt) {
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > 10) this.trail.shift();
        const dist = Math.hypot(this.tx - this.x, this.ty - this.y);
        if (dist < this.speed * dt) {
          // Reached target — detonate
          this.alive = false;
          return {detonated: true, cx: this.tx, cy: this.ty};
        }
        this.x += (this.tx - this.x) / dist * this.speed * dt;
        this.y += (this.ty - this.y) / dist * this.speed * dt;
        return {detonated: false};
      }
      draw(ctx) {
        // Blue/yellow alternating trail
        this.trail.forEach((p, i) => {
          ctx.fillStyle = i % 2 === 0
            ? `rgba(80,160,255,${(i+1)/this.trail.length * 0.8})`
            : `rgba(255,220,60,${(i+1)/this.trail.length * 0.6})`;
          ctx.fillRect(p.x-1, p.y-1, 2, 2);
        });
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(this.x-1, this.y-1, 2, 2);
      }
    }

    // === EXPLOSION CLASS ===

    class Explosion {
      constructor(cx, cy, maxRadius, duration, isGround) {
        this.cx = cx; this.cy = cy;
        this.maxRadius = maxRadius;
        this.duration = duration;
        this.timer = 0;
        this.isGround = isGround;
      }
      get radius() {
        return this.maxRadius * Math.min(this.timer / (this.duration * 0.4), 1);
      }
      get alpha() {
        return Math.max(0, 1 - this.timer / this.duration);
      }
      isColliding(x, y) {
        return Math.hypot(x - this.cx, y - this.cy) <= this.radius;
      }
      isDone() { return this.timer >= this.duration; }
      update(dt) { this.timer += dt; }
      draw(ctx) {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        // Outer ring
        ctx.strokeStyle = this.isGround ? '#ff8800' : '#ffff44';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(this.cx, this.cy, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        // Inner fill
        const grad = ctx.createRadialGradient(
          this.cx, this.cy, 0, this.cx, this.cy, this.radius
        );
        grad.addColorStop(0, this.isGround ? 'rgba(255,80,0,0.6)' : 'rgba(255,255,100,0.4)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.cx, this.cy, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // === PARTICLE CLASS ===

    class Particle {
      constructor(x, y, vx, vy, color, life) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.color = color;
        this.life = life;
        this.maxLife = life;
      }
      isDead() { return this.life <= 0; }
      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += 150 * dt;  // gravity
        this.life -= dt;
      }
      draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x-1, this.y-1, 2, 2);
        ctx.restore();
      }
    }

    // === SOUND ENGINE CLASS ===

    class SoundEngine {
      constructor() {
        this.ctx = null;
      }

      _ensureContext() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
        return this.ctx;
      }

      playLaunch() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.linearRampToValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0.001, now + 0.12);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.12);
        osc.onended = () => { osc.disconnect(); gain.disconnect(); };
      }

      playExplosion() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(80, now + 0.3);
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.linearRampToValueAtTime(0.001, now + 0.35);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.35);
        osc.onended = () => { osc.disconnect(); gain.disconnect(); };
      }

      playBuildingHit() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        // Rumble oscillator (low sawtooth sweep)
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(150, now);
        osc1.frequency.linearRampToValueAtTime(40, now + 0.4);
        gain1.gain.setValueAtTime(0.5, now);
        gain1.gain.linearRampToValueAtTime(0.001, now + 0.45);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.45);
        osc1.onended = () => { osc1.disconnect(); gain1.disconnect(); };
        // Noise-like crunch (square wave with rapid frequency modulation)
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'square';
        osc2.frequency.setValueAtTime(200, now);
        osc2.frequency.linearRampToValueAtTime(80, now + 0.05);
        osc2.frequency.setValueAtTime(300, now + 0.05);
        osc2.frequency.linearRampToValueAtTime(50, now + 0.15);
        osc2.frequency.setValueAtTime(180, now + 0.15);
        osc2.frequency.linearRampToValueAtTime(30, now + 0.35);
        gain2.gain.setValueAtTime(0.35, now);
        gain2.gain.linearRampToValueAtTime(0.001, now + 0.45);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now);
        osc2.stop(now + 0.45);
        osc2.onended = () => { osc2.disconnect(); gain2.disconnect(); };
      }

      playWaveComplete() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        // First note: 400Hz for 0.12s
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'square';
        osc1.frequency.setValueAtTime(400, now);
        gain1.gain.setValueAtTime(0.25, now);
        gain1.gain.linearRampToValueAtTime(0.001, now + 0.12);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.12);
        osc1.onended = () => { osc1.disconnect(); gain1.disconnect(); };
        // Second note: 600Hz for 0.15s, starts after first
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'square';
        osc2.frequency.setValueAtTime(600, now + 0.12);
        gain2.gain.setValueAtTime(0.001, now);
        gain2.gain.setValueAtTime(0.25, now + 0.12);
        gain2.gain.linearRampToValueAtTime(0.001, now + 0.27);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now + 0.12);
        osc2.stop(now + 0.27);
        osc2.onended = () => { osc2.disconnect(); gain2.disconnect(); };
      }

      playGameOver() {
        const ctx = this._ensureContext();
        const now = ctx.currentTime;
        const notes = [500, 400, 250];
        const noteDur = 0.2;
        const gap = 0.05;
        notes.forEach((freq, i) => {
          const start = now + i * (noteDur + gap);
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(freq, start);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.setValueAtTime(0.3, start);
          gain.gain.linearRampToValueAtTime(0.001, start + noteDur);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(start);
          osc.stop(start + noteDur);
          osc.onended = () => { osc.disconnect(); gain.disconnect(); };
        });
      }
    }

    // === GAME CLASS ===

    class Game {
      constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.ctx.imageSmoothingEnabled = false;

        this.state = 'start';
        this.lastTime = 0;
        this.stars = [];
        this.buildings = [];

        this._initStars();
        this._initBuildings();

        this.score = 0;
        this.interceptors = [];
        this.missiles = [];
        this.explosions = [];
        this.particles = [];
        this.shakeTimer = 0;
        this.shakeMag = 0;
        this.spawnTimer = 0;
        this.spawnInterval = 2.2;  // instance property (not const) so S03 can mutate per-wave

        // Wave/state-machine properties (T02 will populate logic)
        this.wave = 0;
        this.missilesSpawnedThisWave = 0;
        this.totalMissilesThisWave = 0;
        this.interludeTimer = 0;
        this.interludeBonusAwarded = false;
        this.interludeBonus = 0;

        this.sound = new SoundEngine();

        this.canvas.addEventListener('click', e => this._handleClick(e));

        requestAnimationFrame(t => this._loop(t));
      }

      _loop(timestamp) {
        const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
        this.lastTime = timestamp;
        this.update(dt);
        this.draw();
        requestAnimationFrame(t => this._loop(t));
      }

      update(dt) {
        // Stars always update in ALL states
        for (const star of this.stars) star.update(dt);

        // Interlude: count down timer, let explosions/particles clean up visually
        if (this.state === 'interlude') {
          this.interludeTimer -= dt;
          // Clean up lingering visual effects from previous wave
          for (const ex of this.explosions) ex.update(dt);
          this.explosions = this.explosions.filter(ex => !ex.isDone());
          for (const p of this.particles) p.update(dt);
          this.particles = this.particles.filter(p => !p.isDead());
          if (this.interludeTimer <= 0) {
            this.state = 'playing';
            this._startWave(this.wave + 1);
          }
          return;
        }

        // Start / game_over: only stars update (already done above)
        if (this.state !== 'playing') return;

        // === PLAYING STATE: 9-step gameplay pipeline ===
        for (const building of this.buildings) building.update(dt);

        // 1. Decay shake
        this.shakeTimer = Math.max(0, this.shakeTimer - dt);

        // 2. Update interceptors, collect detonations
        for (const ic of this.interceptors) {
          if (!ic.alive) continue;
          const result = ic.update(dt);
          if (result.detonated) {
            this.explosions.push(new Explosion(result.cx, result.cy, 60, 1.8, false));
            this.sound.playExplosion();
          }
        }
        this.interceptors = this.interceptors.filter(i => i.alive);

        // 3. Missile spawner (wave-aware: stop after quota)
        this.spawnTimer += dt;
        if (this.spawnTimer >= this.spawnInterval && this.missilesSpawnedThisWave < this.totalMissilesThisWave) {
          this.spawnTimer = 0;
          this._spawnMissile();
        }

        // 4. Update missiles
        for (const m of this.missiles) m.update(dt);

        // 5. Building AABB hit detection (BEFORE explosion collision)
        for (const m of this.missiles) {
          if (!m.alive) continue;
          for (const b of this.buildings) {
            if (b.destroyed) continue;
            const bounds = b.getBounds();
            if (m.x >= bounds.x && m.x <= bounds.x + bounds.width &&
                m.y >= bounds.y && m.y <= bounds.y + bounds.height) {
              m.alive = false;
              const bcx = bounds.x + bounds.width/2;
              const bcy = bounds.y + bounds.height/2;
              b.destroy();
              this.explosions.push(new Explosion(bcx, bcy, 90, 1.0, true));
              this._spawnDebris(bcx, bcy, 20, ['#ff8800','#ffcc00','#ff4400','#888888']);
              this._screenShake(0.4, 8);
              this.sound.playBuildingHit();
              break;
            }
          }
        }

        // 6. Explosion updates + missile kill detection
        for (const ex of this.explosions) ex.update(dt);
        for (const m of this.missiles) {
          if (!m.alive) continue;
          for (const ex of this.explosions) {
            if (!ex.isDone() && !ex.isGround && ex.isColliding(m.x, m.y)) {
              m.alive = false;
              this.score += 10;
              break;
            }
          }
        }
        this.explosions = this.explosions.filter(ex => !ex.isDone());

        // 7. Particles
        for (const p of this.particles) p.update(dt);
        this.particles = this.particles.filter(p => !p.isDead());

        // 8. Filter dead missiles (including off-screen)
        for (const m of this.missiles) {
          if (m.y > 620 || m.y < -20 || m.x < -20 || m.x > 820) m.alive = false;
        }
        this.missiles = this.missiles.filter(m => m.alive);

        // 9. Screen shake transform (CSS transform — NOT ctx.translate)
        if (this.shakeTimer > 0) {
          const dx = (Math.random()-0.5)*2 * this.shakeMag;
          const dy = (Math.random()-0.5)*2 * this.shakeMag;
          this.canvas.style.transform = `translate(${dx}px,${dy}px)`;
        } else {
          this.canvas.style.transform = '';
        }

        // 10. Game-over detection FIRST: all buildings destroyed
        if (this.buildings.filter(b => !b.destroyed).length === 0) {
          this.state = 'game_over';
          this.sound.playGameOver();
          this.canvas.style.transform = '';
          return;
        }

        // 11. Wave-completion detection: all spawned AND no alive missiles remain
        if (this.missilesSpawnedThisWave >= this.totalMissilesThisWave && this.missiles.length === 0 && this.state === 'playing') {
          this._endWave();
        }
      }

      draw() {
        const ctx = this.ctx;
        // Always draw background and stars in all states
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, 800, 600);
        for (const star of this.stars) star.draw(ctx);

        if (this.state === 'start') {
          this._drawStartScreen(ctx);
          return;
        }

        if (this.state === 'game_over') {
          // Draw buildings (destroyed state) beneath overlay
          for (const building of this.buildings) building.draw(ctx);
          this._drawGameOverScreen(ctx);
          return;
        }

        // === PLAYING and INTERLUDE share the gameplay scene ===
        for (const building of this.buildings) building.draw(ctx);

        // Launch base: cyan triangle at (400, 590)
        ctx.fillStyle = '#00ffff';
        ctx.beginPath();
        ctx.moveTo(400, 582);
        ctx.lineTo(394, 598);
        ctx.lineTo(406, 598);
        ctx.closePath();
        ctx.fill();

        // Draw entity layers
        for (const m of this.missiles) m.draw(ctx);
        for (const ic of this.interceptors) ic.draw(ctx);
        for (const ex of this.explosions) ex.draw(ctx);
        for (const p of this.particles) p.draw(ctx);

        // HUD
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px monospace';
        ctx.fillText(`SCORE: ${this.score}`, 10, 20);
        ctx.fillText(`BUILDINGS: ${this.buildings.filter(b=>!b.destroyed).length}`, 10, 40);
        ctx.fillText(`WAVE: ${this.wave}`, 680, 20);

        if (this.state === 'interlude') {
          this._drawInterlude(ctx);
        }
      }

      _handleClick(e) {
        if (this.state === 'start') {
          this._resetGame();
          this.state = 'playing';
          this._startWave(1);
          return;
        }

        if (this.state === 'game_over') {
          this._resetGame();
          this.state = 'start';
          return;
        }

        if (this.state === 'interlude') return; // ignore clicks during interlude

        // state === 'playing' — existing interceptor launch logic
        const activeCount = this.interceptors.filter(i => i.alive).length
                          + this.explosions.filter(ex => !ex.isGround && !ex.isDone()).length;
        if (activeCount >= 3) return;
        const rect = this.canvas.getBoundingClientRect();
        const gx = (e.clientX - rect.left) * (800 / rect.width);
        const gy = (e.clientY - rect.top)  * (600 / rect.height);
        this.interceptors.push(new Interceptor(400, 590, gx, gy));
        this.sound.playLaunch();
      }

      _drawStartScreen(ctx) {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 40px monospace';
        ctx.fillText('IRON DOME', 400, 260);
        ctx.font = '20px monospace';
        ctx.fillStyle = '#cccccc';
        ctx.fillText('Click to Start', 400, 310);
        ctx.restore();
      }

      _drawGameOverScreen(ctx) {
        // Semi-transparent dark overlay
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, 800, 600);
        ctx.save();
        ctx.textAlign = 'center';
        // Red 'GAME OVER'
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 48px monospace';
        ctx.fillText('GAME OVER', 400, 250);
        // White final score
        ctx.fillStyle = '#ffffff';
        ctx.font = '24px monospace';
        ctx.fillText(`FINAL SCORE: ${this.score}`, 400, 310);
        // Restart prompt
        ctx.fillStyle = '#cccccc';
        ctx.font = '18px monospace';
        ctx.fillText('Click to Restart', 400, 370);
        ctx.restore();
      }

      _drawInterlude(ctx) {
        // Semi-transparent overlay
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, 800, 600);
        ctx.save();
        ctx.textAlign = 'center';
        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 36px monospace';
        ctx.fillText(`WAVE ${this.wave} COMPLETE`, 400, 240);
        if (this.interludeBonusAwarded && this.interludeBonus > 0) {
          ctx.fillStyle = '#ffdd44';
          ctx.font = 'bold 24px monospace';
          ctx.fillText(`+${this.interludeBonus} BUILDING BONUS`, 400, 290);
        }
        ctx.fillStyle = '#cccccc';
        ctx.font = '18px monospace';
        ctx.fillText(`Next wave in ${Math.ceil(this.interludeTimer)}...`, 400, 340);
        ctx.restore();
      }

      _startWave(n) {
        this.wave = n;
        this.totalMissilesThisWave = 3 + n * 2;       // wave 1 = 5, wave 5 = 13
        this.missilesSpawnedThisWave = 0;
        this.spawnInterval = Math.max(0.6, 2.2 - n * 0.2); // wave 1 = 2.0s, wave 5 = 1.2s
        this.spawnTimer = 0;
      }

      _endWave() {
        this.state = 'interlude';
        this.sound.playWaveComplete();
        this.interludeTimer = 2.5;
        const alive = this.buildings.filter(b => !b.destroyed).length;
        this.interludeBonus = alive * 100;
        this.score += this.interludeBonus;
        this.interludeBonusAwarded = true;
      }

      _resetGame() {
        this.buildings = [];
        this._initBuildings();
        this.score = 0;
        this.interceptors = [];
        this.missiles = [];
        this.explosions = [];
        this.particles = [];
        this.spawnTimer = 0;
        this.shakeTimer = 0;
        this.shakeMag = 0;
        this.wave = 0;
        this.missilesSpawnedThisWave = 0;
        this.totalMissilesThisWave = 0;
        this.interludeTimer = 0;
        this.interludeBonusAwarded = false;
        this.interludeBonus = 0;
        this.canvas.style.transform = '';
      }

      _spawnMissile() {
        const sx = 20 + Math.random() * 760;
        const alive = this.buildings.filter(b => !b.destroyed);
        const target = alive.length > 0 ? alive[Math.floor(Math.random() * alive.length)] : null;
        const tx = target ? target.x + target.width/2 : Math.random()*800;
        const ty = target ? target.y + target.height/2 : 590;
        const speed = (80 + Math.random() * 40) * (1 + this.wave * 0.12);
        this.missiles.push(new Missile(sx, 0, tx, ty, speed));
        this.missilesSpawnedThisWave++;
      }

      _spawnDebris(cx, cy, count, colors) {
        for (let i = 0; i < count && this.particles.length < 200; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 40 + Math.random() * 120;
          const color = colors[Math.floor(Math.random() * colors.length)];
          this.particles.push(new Particle(
            cx, cy,
            Math.cos(angle)*speed, Math.sin(angle)*speed - 60,
            color, 0.6 + Math.random()*0.8
          ));
        }
      }

      _screenShake(duration, magnitude) {
        this.shakeTimer = duration;
        this.shakeMag = magnitude;
      }

      _initStars() {
        for (let i = 0; i < 90; i++) {
          this.stars.push(new Star(this.canvas));
        }
      }

      _initBuildings() {
        const heights = [80, 60, 90, 70, 100, 65];
        for (let i = 0; i < 6; i++) {
          const x = 40 + i * (720 / 5);
          const h = heights[i];
          const y = 600 - h - 10;
          this.buildings.push(new Building(x, y, 64, h));
        }
      }
    }

    window.addEventListener('load', () => new Game());
  </script>
